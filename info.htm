<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Table Extractor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .controls {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 400px;
            padding: 8px;
            font-size: 14px;
        }
        button {
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* Styling for your custom viewed table */
        .custom-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .custom-table th, .custom-table td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 12px;
        }
        .custom-table th {
            background-color: #4CAF50;
            color: white;
        }
        .custom-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .error {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>External Table Extractor</h2>
    
    <div class="controls">
        <input type="text" id="targetUrl" placeholder="https://arkkitehtuuripankki.onqpr.com/QPR/Portal/QPR.Isapi.dll?PGPLUGIN&*putab&FMT=p&LAN=en%2c1&skin=portal&TPL=customhierarchytreeview.tpl&H=customhierarchy&EHID=204759840&R=3_0_743041689_204759840&MODELID=743041689&RID=267347210999453924" value="">
        <button onclick="fetchAndExtractTable()">Extract Table</button>
    </div>

    <div id="errorMessage" class="error"></div>
    <div id="tableContainer"></div>

    <script>
        async function fetchAndExtractTable() {
            const url = document.getElementById('targetUrl').value.trim();
            const container = document.getElementById('tableContainer');
            const errorDiv = document.getElementById('errorMessage');
            
            // Reset states
            container.innerHTML = "Loading and parsing data...";
            errorDiv.textContent = "";

            if (!url) {
                errorDiv.textContent = "Please enter a valid URL.";
                container.innerHTML = "";
                return;
            }

            try {
                // Using a public CORS proxy to fetch the HTML data bypass restrictions
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Failed to fetch the target website.");
                
                const htmlText = await response.text();

                // Parse the string text into a readable DOM structure
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                // Target the specific table by its ID
                const sourceTable = doc.getElementById('ResizableTable');

                if (!sourceTable) {
                    throw new Error("Could not find a table with ID 'ResizableTable' on the target page.");
                }

                // 1. Rebuild the Custom Table element
                const customTable = document.createElement('table');
                customTable.className = 'custom-table';

                // 2. Extract column headers from the <thead> tag's element title attributes
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                
                // Finds elements inside thead that contain a title attribute (e.g., <th title="...">)
                const sourceHeaders = sourceTable.querySelectorAll('thead [title]');
                
                if (sourceHeaders.length > 0) {
                    sourceHeaders.forEach(headerEl => {
                        const th = document.createElement('th');
                        // Grab the value from the title attribute
                        th.textContent = headerEl.getAttribute('title'); 
                        headerRow.appendChild(th);
                    });
                } else {
                    // Fallback if title attribute wasn't found but standard <th> tags exist
                    const fallbackHeaders = sourceTable.querySelectorAll('thead th');
                    fallbackHeaders.forEach(headerEl => {
                        const th = document.createElement('th');
                        th.textContent = headerEl.textContent.trim();
                        headerRow.appendChild(th);
                    });
                }
                thead.appendChild(headerRow);
                customTable.appendChild(thead);

                // 3. Extract the body rows and strip out extra HTML tags from cells
                const tbody = document.createElement('tbody');
                const sourceRows = sourceTable.querySelectorAll('tr');

                sourceRows.forEach(row => {
                    // Skip the row if it lives inside the thead section
                    if (row.closest('thead')) return;

                    const sourceCells = row.querySelectorAll('td');
                    if (sourceCells.length === 0) return; // Skip empty rows

                    const customRow = document.createElement('tr');

                    sourceCells.forEach(cell => {
                        const customCell = document.createElement('td');
                        
                        /* CRITICAL PART: .textContent automatically ignores any nested HTML tags 
                           (like <span>, <a>, <strong>, etc.) and extracts only the pure text inside.
                        */
                        customCell.textContent = cell.textContent.trim();
                        
                        customRow.appendChild(customCell);
                    });

                    tbody.appendChild(customRow);
                });

                customTable.appendChild(tbody);

                // Render the built custom table to the screen
                container.innerHTML = "";
                container.appendChild(customTable);

            } catch (error) {
                errorDiv.textContent = `Error: ${error.message}`;
                container.innerHTML = "";
                console.error(error);
            }
        }
    </script>
</body>
</html>
